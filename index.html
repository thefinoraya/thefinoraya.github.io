    <!-- Radical Background: High-frequency data stream -->
    <canvas id="market-pulse"></canvas>
    
    <!-- Vertical Badge (Topological Betrayal) -->
    <div class="vertical-status">
        <span class="status-line"></span>
        <span class="status-text">SYSTEM_STATUS: PRE_LAUNCH</span>
    </div>

    <main class="brutalist-container">
        <!-- Logo Header -->
        <header class="logo-header">
            <img src="logo.png" alt="Finoraya Logo" class="brand-logo">
        </header>

        <!-- Big Coming Soon Badge -->
        <div class="big-badge-container">
            <div class="coming-soon-badge-big">COMING SOON</div>
        </div>

        <!-- Professional Market Animation Hero -->
        <div class="market-hero-animation">
            <div class="candlestick-wrapper">
                <div class="candlestick bullish" style="--delay: 0.1s; --h: 35%; --mb: 10%;"></div>
                <div class="candlestick bearish" style="--delay: 0.3s; --h: 25%; --mb: 35%;"></div>
                <div class="candlestick bullish" style="--delay: 0.2s; --h: 45%; --mb: 15%;"></div>
                <div class="candlestick bullish" style="--delay: 0.5s; --h: 55%; --mb: 5%;"></div>
                <div class="candlestick bearish" style="--delay: 0.4s; --h: 30%; --mb: 45%;"></div>
                <div class="candlestick bullish" style="--delay: 0.7s; --h: 60%; --mb: 20%;"></div>
                <div class="candlestick bullish" style="--delay: 0.6s; --h: 80%; --mb: 0%;"></div>
            </div>
        </div>

        <div class="info-staggered">
            <div class="stagger-item l-1">
                <h2 class="sub-headline">The Future of <span class="text-amber">Indian Markets</span>.</h2>
            </div>
            <div class="stagger-item l-2">
                <p class="description">
                    Institutional-grade insights for Stocks, Mutual Funds, and IPOs. 
                    Built for those who demand precision.
                </p>
            </div>
